repos:
  # 1. SECRET SCAN — Gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: "🔐 Secret scan (Gitleaks)"

  # 2. SAST — Semgrep
  - repo: https://github.com/semgrep/semgrep
    rev: v1.72.0
    hooks:
      - id: semgrep
        name: "🔍 SAST (Semgrep)"
        args:
          - --config=auto
          - --error # exit non-zero nếu có finding
          - --severity=ERROR
          - --quiet
  # 3. CODE QUALITY
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^k8s/
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key # backup layer cho secret detection
