name: DevSecOps CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
      branches:
        - main
env:
  IMAGE_NAME: ghcr.io/biniter1/damn-vulnerable-restaurant-api-game
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('**/.pre-commit-config.yaml') }}
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified
  sast-iac:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run SemGrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrerts
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
      
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_145
      
      - name: Upload Checkov result
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry==1.8.3
      - name: Export requirements from Poetry
        run: |
          poetry export \
            -f requirements.txt \
            --output requirements-ci.txt \
            --without-hashes \
            --without dev   

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements-ci.txt \
            --format=json \
            --output=pip-audit-report.json \
            || true   

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
      
      
      # - name: Snyk scan
      #   uses: snyk/actions/python@master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   with:
      #     args: --file=requirements-ci.txt --severity-threshold=high
  unit-test:
    name: "🧪 Unit tests"
    runs-on: ubuntu-latest
    needs: [sast-iac, dependency-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests via Docker Compose
        run: |
          docker compose build
          docker compose run --rm web pytest . -v --tb=short

      - name: Cleanup
        if: always()
        run: docker compose down -v
      
  ci-gate:
    runs-on: ubuntu-latest
    needs: [pre-commit, secret-scan, sast-iac, dependency-scan, unit-test]
    if: always()
    steps:
      - name: Check all CI jobs passed
        run: |
          count=0
          if [[ "${{needs.pre-commit.result}}" != "success" ]];
          then
            echo "Job pre-commit not successful"
            ((count++))
          fi
          if [[ "${{needs.secret-scan.result}}" != "success" ]];
          then
            echo "Job secret-scan not successful"
            ((count++))
          fi
          if [[ "${{needs.sast-iac.result}}" != "success" ]];
          then
            echo "Job sast-iac not successful"
            ((count++))
          fi
          if [[ "${{needs.dependency-scan.result}}" != "success" ]];
          then
            echo "Job dependecy-scan not successful"
            ((count++))
          fi
          if [[ "${{needs.unit-test.result}}" != "success" ]];
          then
            echo "Job unit-test not successful"
            ((count++))
          fi

          if [[ "${count}" -ne 0 ]];
          then
            exit 1
          else
            echo "All jobs passed"
          fi






