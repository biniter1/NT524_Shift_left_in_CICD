apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: staging
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: restaurant
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: stagingpassword123
  ENV: staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-app
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-app
  template:
    metadata:
      labels:
        app: restaurant-app
    spec:
      containers:
        - name: app
          image: IMAGE_PLACEHOLDER # workflow sẽ thay thế bằng image thật
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-app
  namespace: staging
spec:
  selector:
    app: restaurant-app
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
